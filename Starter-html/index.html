<!--  html - Hypertext Markup Language  -->
<!--  Anatomia das tags (h1, etc) -->
<h1>Título</h1>

<!--  Aninhamento das tags  
  Fluxo
  Hierarquia
  Posisiconamento
-->
aaaaaaaaaa

<!--  Elementos vazios (Não tem fechamento) -->
<img src="" alt="" />
<input type="text" />

<!--  Atributos html  (Infos extras)  -->
<img src="imagem.png" alt="Infos extra" />

<!--  Atributos booleanos (Não precisam de conteúdo(ex: disable))  -->
<input type="text" disabled />

<!--  Aspas 
  omissão
  simples
  duplas
 -->
<a href="https://goggle.com">link</a>

<!--  Atributos Globais mais utilizados
  class:
      Pode repitir.
  contenteditable:
      True ou false, modifica o contéudo ou não.
  data-*
  hidden:
      Deixa o conteúdo insivisel.
  id:
      Único.
  style
  tabindex:
      Ordem de mostrar.
  title:
      Define um título.
  Usados para:
      Aplicar estilo css
      Acessar pelo js
-->
<div class="classe" contenteditable="true" id="name" tabindex="3">conteúdo</div>
<div
  class="classe"
  data-qualquerNomeAqui=""
  id="name1"
  style="color: white"
  tabindex="1"
>
  conteúdo
</div>
<div class="classe" tabindex="2">conteúdo</div>
